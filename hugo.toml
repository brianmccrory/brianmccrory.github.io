baseURL = 'https://about.jazzofjapan.com'
theme = 'hugo-bearblog'
title = 'About Jazz of Japan'
author = 'Brian McCrory'
copyright = '© Brian McCrory <a href="https://www.jazzofjapan.com">Jazz of Japan</a>'
languageCode = 'en-US'
enableRobotsTXT = true
capitalizeListTitles = false
enableGitInfo = true # automatic lastmod based on git

[frontmatter]
  date = [":filename", ":default"]

disableKinds = ["taxonomy"]
ignoreErrors = ["error-disable-taxonomy"]
[permalinks]
  [permalinks.page]
    blog = "/:contentbasename/"
  [permalinks.term]
    tags = "/:slug/"

[params]
  description = 'About the Jazz of Japan newsletter and archive'
  dateFormat = "Jan 02, 2006"
  favicon = 'favicon.ico'
  hideMadeWithLine = true
  enablePostNavigator = false

[markup]
  [markup.highlight]
    style = 'friendly'
    lineNos = false
    lineNumbersInTable = false
    codeFences = true
  [markup.goldmark.renderer]
    unsafe = true

[menu]
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 1
  [[menu.main]]
    name = "Indexes"
    url = "/indexes/"
    weight = 2
  [[menu.main]]
    name = "Audio"
    url = "/audio/"
    weight = 3
  [[menu.main]]
    name = "Supporters"
    url = "/support/"
    weight = 5
  [[menu.main]]
    name = "Jazz of Japan"
    url = "https://www.jazzofjapan.com/"
    weight = 10
