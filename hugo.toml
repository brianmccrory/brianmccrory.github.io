baseURL = 'https://docs.jazzofjapan.com'
languageCode = 'en-us'
title = 'Jazz of Japan Docs'
#theme = 'ananke'
#mainSections = ["posts"]

#theme = 'hugo-book' # https://github.com/alex-shpak/hugo-book
enableGitInfo = false
copyright = '© Brian McCrory <a href="https://www.jazzofjapan.com">Jazz of Japan</a>'
theme = 'hugo-bearblog'

[author]
  name = 'Brian McCrory'
  homepage = "https://www.jazzofjapan.com"

[params]
  author = 'Brian McCrory'
  description = 'Indexes for the Jazz of Japan newsletter and archive'
  homepage = "https://www.jazzofjapan.com"
  recent_posts_number = 6
  BookSection = '*'
  BookLogo = 'favicon-32x32.png'
  favicon = 'favicon.ico'
  hideMadeWithLine = true
  enablePostNavigator = true
  dateFormat = "2006-01-02"

#[permalinks]
#  posts = "/posts/:slug/"
#  tags = "/posts/:slug"

[pagination]
  pagerSize = 6

[markup.goldmark.renderer]
  unsafe = true

[markup]
  [markup.highlight]
    style = 'friendly'
    lineNos = true
    lineNumbersInTable = false
    codeFences = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[menu]
[[menu.main]]
    name = "Jazz of Japan"
    url  = "https://www.jazzofjapan.com/"
    weight = 200

[menus]
[[menu.before]]
  name = 'Jazz of Japan'
  url = 'https://www.jazzofjapan.com/'
  weight = 1
  bookFlatSection = true


